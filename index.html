<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Saya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tombol tema -->
    <button id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false" title="Toggle theme">🌙</button>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Halo, Saya <span id="typing"></span></h1>
            <p>Saya adalah seorang mahasiswa semester 6 berkuliah di Universitas Muhammadiyah Cirebon yang berfokus dalam bidang web developer.</p>
            <!-- Social icons -->
            <div class="social-icons">
                <a href="https://github.com/HamdanSadad/" class="social" aria-label="GitHub" title="GitHub">
                    <img src="img/github.png" alt="GitHub" class="social-icon">
                </a>
                <a href="https://www.linkedin.com/in/hamdansadad/" class="social" aria-label="LinkedIn" title="LinkedIn">
                    <img src="img/linkedin.png" alt="LinkedIn" class="social-icon">
                </a>
                <a href="https://wa.me/6282117964344/" class="social" aria-label="WhatsApp" title="WhatsApp">
                    <img src="img/whatsapp.png" alt="WhatsApp" class="social-icon">
                </a>
                <a href="https://www.instagram.com/hamdannn_s" class="social" aria-label="Instagram" title="Instagram">
                    <img src="img/instagram.png" alt="Instagram" class="social-icon">
                </a>
            </div>
        </div>
        
        <!-- Hero image -->
        <div class="hero-image">
            <img src="img/profil.jpg" alt="Foto Profil">
        </div>
    </section>

    <!-- Footer -->
    <footer id="contact">
        <p>© 2026 Hamdan Sadad. All rights reserved.</p>
    </footer>

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
            });
        });

        // Animasi mengetik
        const texts = ["Hamdan Sadad", "seorang Web Developer"];
        let count = 0;
        let index = 0;
        let currentText = '';
        let letter = '';

                // Fungsi typing
                (function type() {
            if (count === texts.length) {
                count = 0;
            }
            currentText = texts[count];
            letter = currentText.slice(0, ++index);

            document.getElementById('typing').textContent = letter;
            if (letter.length === currentText.length) {
                count++;
                index = 0;
                setTimeout(type, 2000);
            } else {
                setTimeout(type, 200);
            }
        }());

        // Toggle tema
        (function themeToggle() {
            const btn = document.getElementById('theme-toggle');
            const body = document.body;
            const preferred = localStorage.getItem('theme');

            function applyTheme(theme) {
                if (theme === 'dark') {
                    body.classList.add('dark');
                    btn.textContent = '☀️';
                    btn.setAttribute('aria-pressed', 'true');
                } else {
                    body.classList.remove('dark');
                    btn.textContent = '🌙';
                    btn.setAttribute('aria-pressed', 'false');
                }
            }

            // initial: check saved preference or system preference
            if (preferred) {
                applyTheme(preferred);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme('dark');
            } else {
                applyTheme('light');
            }

            btn.addEventListener('click', () => {
                const isDark = body.classList.toggle('dark');
                const theme = isDark ? 'dark' : 'light';
                applyTheme(theme);
                localStorage.setItem('theme', theme);
            });
        })();
    </script>

</body>
</html>
